  ollama:
    container_name: ollama_amd
    build:
      context: .
      dockerfile: Dockerfile.ollama_amd
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ${USER_PATH}/${AGENT_PATH}/models:/root/.ollama
      - ${USER_PATH}/${AGENT_PATH}/ollama:/home/ollama
    ports:
      - "11434:11434"
      - "18789:18789"
    stdin_open: true
    tty: true
    networks:
      - agents
  # agent:
  #   container_name: agent
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.agent
  #   environment:
  #       # LA CLAVE: Aquí le dices al agente dónde está Ollama
