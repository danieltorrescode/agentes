  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${USER_PATH}/${AGENT_PATH}/open-webui:/app/backend/data
    ports:
      - "3000:8080"
    restart: always
    networks:
      - agents
networks:
  agents:
    external: true
    name: agents
